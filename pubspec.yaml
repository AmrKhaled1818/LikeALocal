name: like_a_local
description: "LikeALocal - Discover hidden gems in your city like a local."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.0.0

  # State Management
  provider: ^6.0.0

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.0.0

  # Network
  http: ^1.0.0
  cached_network_image: ^3.0.0
  connectivity_plus: ^6.0.0

  # ID generation
  uuid: ^4.5.1

  # Cloudinary SDK
  cloudinary_public: ^0.23.1

  # Storage & Caching
  shared_preferences: ^2.0.0
  flutter_secure_storage: ^9.0.0

  # UI
  shimmer: ^3.0.0
  timeago: ^3.0.0
  share_plus: ^10.0.0
  flutter_markdown: ^0.7.0
  url_launcher: ^6.2.0

  # Navigation
  go_router: ^14.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  fluttertoast: ^8.2.0
  flutter_map_marker_cluster: ^1.4.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
